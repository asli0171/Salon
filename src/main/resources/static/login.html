<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon — Log ind</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #C8A97E;
            --beige: #EDE8DF;
            --light: #F5F0E8;
            --dark: #2C2C2A;
            --muted: #8A7F6E;
            --lbrown: #D4C9B8;
            --dbrown: #B8956A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--light);
            color: var(--dark);
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            min-height: 100vh;
        }

        nav {
            background: var(--beige);
            border-bottom: 0.5px solid var(--lbrown);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 60px;
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 6px;
            color: var(--dark);
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 32px; list-style: none; }
        .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; letter-spacing: 1px; }
        .nav-links a:hover { color: var(--dark); }

        .btn-dark {
            background: var(--dark); color: var(--light); border: none;
            padding: 8px 20px; font-family: 'Jost', sans-serif; font-size: 12px;
            letter-spacing: 1.5px; cursor: pointer; border-radius: 20px;
            text-decoration: none; display: inline-block;
        }
        .btn-dark:hover { background: #444441; }

        .login-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 60px);
        }

        .login-img {
            background: var(--dbrown);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #8a6a45;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .login-form {
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-eyebrow {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .login-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 300;
            color: var(--dark);
            line-height: 1.2;
            margin-bottom: 40px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: var(--beige);
            border: 0.5px solid var(--lbrown);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            color: var(--dark);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--cream); }
        input::placeholder { color: var(--lbrown); }

        .btn-submit {
            width: 100%;
            background: var(--dark);
            color: var(--light);
            border: none;
            padding: 14px;
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .btn-submit:hover { background: #444441; }

        .login-footer {
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
            text-align: center;
        }

        .login-footer a {
            color: var(--dark);
            font-weight: 500;
            text-decoration: none;
        }

        .login-footer a:hover { color: var(--cream); }

        .error-msg {
            background: #f9e8e8;
            border: 0.5px solid #e8b4b4;
            color: #8a3a3a;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<div id="cookie-banner" style="display:none; position:fixed; bottom:0; left:0; right:0; background:var(--dark); color:var(--light); padding:16px 40px; display:flex; align-items:center; justify-content:space-between; z-index:999; font-size:12px; letter-spacing:0.5px;">
    <span>Vi bruger cookies til sessionshåndtering og for at huske dit login. <a href="/om.html" style="color:var(--cream); text-decoration:none;">Læs mere</a></span>
    <div style="display:flex; gap:10px;">
        <button onclick="acceptCookies()" style="background:var(--cream); color:var(--dark); border:none; padding:8px 20px; border-radius:20px; font-family:'Jost',sans-serif; font-size:11px; cursor:pointer;">Accepter</button>
        <button onclick="declineCookies()" style="background:transparent; color:var(--muted); border:0.5px solid var(--muted); padding:8px 20px; border-radius:20px; font-family:'Jost',sans-serif; font-size:11px; cursor:pointer;">Afvis</button>
    </div>
</div>

<script>
    if (!localStorage.getItem('cookieConsent')) {
        document.getElementById('cookie-banner').style.display = 'flex';
    }
    function acceptCookies() {
        localStorage.setItem('cookieConsent', 'accepted');
        document.getElementById('cookie-banner').style.display = 'none';
    }
    function declineCookies() {
        localStorage.setItem('cookieConsent', 'declined');
        document.getElementById('cookie-banner').style.display = 'none';
    }
</script>
<body>

<nav>
    <a href="/" class="nav-logo">SALON</a>
    <ul class="nav-links">
        <li><a href="/#services">Services</a></li>
        <li><a href="/#gallery">Frisører</a></li>
        <li><a href="/#contact">Om os</a></li>
    </ul>
    <a href="/booking.html" class="btn-dark">Book tid</a>
</nav>

<div class="login-wrap">

    <div class="login-img">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>Salonbillede</span>
    </div>

    <div class="login-form">
        <div class="login-eyebrow">Velkommen tilbage</div>
        <h1 class="login-title">Log ind på<br>din konto</h1>

        <div class="error-msg" id="error-msg">Forkert brugernavn eller adgangskode</div>

        <form id="login-form" action="/login" method="POST">
            <div class="form-group">
                <label for="username">Brugernavn</label>
                <input type="text" id="username" name="username" placeholder="dit brugernavn" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Adgangskode</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit">LOG IND</button>
        </form>

        <div class="login-footer">
            Har du ikke en konto? <a href="/register.html">Opret dig her</a>
        </div>
    </div>

</div>

<script>
    if (window.location.search.includes('error')) {
        document.getElementById('error-msg').style.display = 'block';
    }
</script>

</body>
</html>
